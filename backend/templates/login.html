<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NayePankh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: radial-gradient(circle at 50% 30%, #1e1b4b 0%, #09090b 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px border;
      border-color: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-200 antialiased p-4">
  <div class="w-full max-w-md space-y-6">
    
    <!-- Brand / Header -->
    <div class="text-center space-y-2">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-xl mx-auto mb-4"
           style="background: linear-gradient(135deg, #E85D04, #F48C06)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
          <path d="M12 2L13.5 8H20L14.75 12L16.5 18L12 14.5L7.5 18L9.25 12L4 8H10.5L12 2Z" />
        </svg>
      </div>
      <h1 class="font-outfit text-3xl font-black text-white tracking-tight">
        Naye<span class="text-orange-500">Pankh</span> Admin
      </h1>
      <p class="text-xs text-gray-400">Secure Administrative Access Panel</p>
    </div>

    <!-- Login Form Card -->
    <div class="glass-card rounded-2xl border border-white/10 p-8 shadow-2xl">
      
      <!-- Invalid credentials message -->
      {% if error %}
        <div class="mb-6 flex items-start gap-2.5 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl px-4 py-3 text-xs leading-relaxed">
          <i class="ri-error-warning-line text-sm shrink-0"></i>
          <div>
            <p class="font-semibold">Authentication Failed</p>
            <p>{{ error }}</p>
          </div>
        </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-5">
        <div>
          <label for="username" class="block text-xs font-semibold text-gray-300 mb-1.5 uppercase tracking-wider">Username</label>
          <div class="relative">
            <i class="ri-user-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              id="username"
              name="username"
              type="text"
              required
              placeholder="admin"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-gray-200 outline-none placeholder-gray-500 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-gray-300 mb-1.5 uppercase tracking-wider">Password</label>
          <div class="relative">
            <i class="ri-lock-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              id="password"
              name="password"
              type="password"
              required
              placeholder="••••••••"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-gray-200 outline-none placeholder-gray-500 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full py-3 rounded-xl text-white font-semibold text-sm transition-all hover:-translate-y-0.5 cursor-pointer shadow-lg hover:shadow-orange-500/20"
          style="background: linear-gradient(135deg, #E85D04, #F48C06)"
        >
          Sign In to Portal
        </button>
      </form>

      <!-- Credentials Helper -->
      <div class="mt-6 pt-5 border-t border-white/5 text-center text-xs text-gray-500">
        <p>Demo Credentials:</p>
        <p class="font-mono text-gray-400 mt-1">
          Username: <span class="text-orange-500/80 font-bold">admin</span> &nbsp;|&nbsp; Password: <span class="text-orange-500/80 font-bold">admin</span>
        </p>
      </div>

    </div>

  </div>
</body>
</html>
